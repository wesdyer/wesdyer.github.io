<!DOCTYPE html>
<html>
<script src="https://code.jquery.com/jquery-3.6.3.min.js" integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js" integrity="sha256-lSjKY0/srUM9BE3dPm+c4fBo1dky2v27Gdjm2uoZaL0=" crossorigin="anonymous"></script>
<script src="legends.js" charset="utf-8"></script>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="legends.css" />
    <title>Heat Legends</title>
    <link rel="icon" type="image/png" href="legend.png" />
</head>
<body>
    <div class="table-responsive">
        <table id="drivers">
            <tr class="heading"><td>Car</td><td>Driver</td><td></td><td>Speed</td><td>Over</td><td>Corner</td><td>&nbsp;</td></tr>
        </table>
    </div>
    <div class="buttons"><button id="next" class="button">Move</button></div>
    <div class="prompt">Select a car</div>
    <div class="add">
        <button class="red selector" color="red"><img src="cars/red.png" class="car" alt="Red Car" /></button>
        <button class="blue selector" color="blue"><img src="cars/blue.png" class="car" alt="Blue Car" /></button>
        <button class="green selector" color="green"><img src="cars/green.png" class="car" alt="Green Car" /></button>
        <button class="yellow selector" color="yellow"><img src="cars/yellow.png" class="car" alt="Yellow Car" /></button>
        <button class="gray selector" color="gray"><img src="cars/gray.png" class="car" alt="Gray Car" /></button>
        <button class="black selector" color="black"><img src="cars/black.png" class="car" alt="Black Car" /></button>
        <button class="orange selector" color="orange"><img src="cars/orange.png" class="car" alt="Orange Car" /></button>
        <button class="purple selector" color="purple"><img src="cars/purple.png" class="car" alt="Purple Car" /></button>
    </div>
    <div id="inputs">
        <div class="flag-select-holder"></div>
        <div class="input-group">
            <button id="speed-plus" class="button">+1 Speed</button>
            <button id="speed-minus" class="button">-1 Speed</button>
        </div>
        <div class="input-group">
            <button id="corner-plus" class="button">+1 Corner</button>
            <button id="corner-minus" class="button">-1 Corner</button>
        </div>
        <div class="input-actions">
            <button id="add" class="button">Add</button>
            <button id="reset" class="button">Reset</button>
        </div>
        <div id="error"></div>
     </div>
</body>
</html>
